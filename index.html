<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Tracker - Δρ. Νίκος Ελευθεριάδης</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907150.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #10b981; --danger: #ef4444; --warning: #facc15; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: #f8fafc; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Splash Screen */
        #welcome-screen { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; text-align: center; padding: 20px; 
        }
        #welcome-screen.hidden { display: none; }
        .welcome-title { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 0; }
        .enter-btn { margin-top: 30px; padding: 15px 50px; border-radius: 30px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* Main App Structure */
        #app-content { display: none; flex-direction: column; height: 100%; }
        
        .tab-content { 
            display: none; 
            padding: 15px; 
            flex: 1; 
            width: 100%; 
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 85px; /* Space for nav bar */
        }
        .tab-content.active { display: flex; flex-direction: column; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; height: 70px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item span:first-child { font-size: 1.5rem; margin-bottom: 2px; }
        
        /* The Card - Adaptive to fill height */
        .card { 
            background: var(--card); 
            padding: 1.2rem; 
            border-radius: 25px; 
            width: 100%; 
            border: 1px solid #334155; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Spreads elements out */
            flex: 1; /* Fills the vertical space */
            margin-bottom: 10px;
        }

        .display { font-size: 1.6rem; font-weight: bold; text-align: center; color: var(--accent); display: flex; justify-content: center; align-items: center; gap: 8px; }
        #freqInput { background: transparent; border: 2px solid #334155; color: var(--accent); font-size: 1.5rem; font-weight: bold; width: 100px; text-align: center; border-radius: 10px; outline: none; }
        
        .row { display: flex; justify-content: center; gap: 10px; width: 100%; }
        
        /* Control Elements */
        .step-btn { padding: 8px; font-size: 0.9rem; background: #334155; color: white; border: none; border-radius: 10px; flex: 1; }
        
        .ear-btn { flex: 1; padding: 18px 5px; font-size: 1rem; border-radius: 15px; border: none; background: #334155; color: white; font-weight: 600; transition: 0.2s; }
        .ear-btn.active { background: var(--accent); color: var(--bg); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        .play-btn { background: #0ea5e9; flex: 1; padding: 15px; border-radius: 12px; font-size: 1.1rem; color: white; border: none; font-weight: bold; }
        .stop-btn { background: var(--danger); flex: 1; padding: 15px; border-radius: 12px; font-size: 1.1rem; color: white; border: none; font-weight: bold; }
        
        .save-btn { 
            background: var(--success); 
            width: 100%; 
            padding: 20px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border-radius: 18px; 
            color: white; 
            border: none;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
            margin-top: 5px;
        }
        
        input[type=range] { width: 100%; accent-color: var(--accent); height: 40px; cursor: pointer; }
        .help-icon { font-size: 0.8rem; color: #94a3b8; border: 1px solid #475569; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; margin-left: 5px; }
        
        /* History Table */
        .log-container { background: var(--card); border-radius: 20px; border: 1px solid #334155; padding: 10px; overflow-y: auto; flex: 1; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .log-table th, .log-table td { padding: 12px 6px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 class="welcome-title">tinnitus tracker</h1>
        <div style="color:white; margin-top:10px; font-weight: 300;">Δρ. Νίκος Ελευθεριάδης</div>
        <button class="enter-btn" onclick="startApp()">είσοδος</button>
    </div>

    <div id="app-content">
        <div id="setup" class="tab-content active">
            <div class="card">
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <div class="display">
                        <span>ύψος</span><span class="help-icon" onclick="showHelp('pitch')">?</span>: 
                        <input type="number" id="freqInput" value="4000"> <span>Hz</span>
                    </div>
                    <input type="range" id="freqSlider" min="125" max="10000" value="4000">
                    <div class="row">
                        <button class="step-btn" onclick="stepHz(-1)">− 1Hz</button>
                        <button class="step-btn" onclick="stepHz(1)">+ 1Hz</button>
                    </div>
                </div>

                <div style="display:flex; flex-direction:column; gap:8px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:600;">ένταση <span class="help-icon" onclick="showHelp('vol')">?</span></span>
                        <span id="volDisplay" style="color:var(--success); font-weight:800; font-size:1.4rem;">10%</span>
                    </div>
                    <input type="range" id="volSlider" min="0" max="50" value="10">
                    <div class="row">
                        <button class="step-btn" onclick="stepVol(-1)">− 1%</button>
                        <button class="step-btn" onclick="stepVol(1)">+ 1%</button>
                    </div>
                    <label style="font-size:0.8rem; color:var(--danger); display:flex; align-items:center; gap:5px; margin-top:2px;">
                        <input type="checkbox" id="unlockVol"> ξεκλείδωμα πλήρους έντασης
                    </label>
                </div>

                <div style="padding:12px; border:1px dashed var(--warning); border-radius:15px; background: rgba(250, 204, 21, 0.05);">
                    <div style="display:flex; justify-content:space-between; color:var(--warning); font-weight:bold; margin-bottom:5px;">
                        <span>ενοχλητικότητα</span>
                        <span id="annoyDisplay">5/10</span>
                    </div>
                    <input type="range" id="annoySlider" min="1" max="10" value="5" style="accent-color:var(--warning);">
                </div>

                <div class="row" style="gap:10px;">
                    <button class="ear-btn" onclick="setEar('Left', this)">αριστερό</button>
                    <button class="ear-btn active" onclick="setEar('Both', this)">και τα δύο</button>
                    <button class="ear-btn" onclick="setEar('Right', this)">δεξί</button>
                </div>
                
                <div class="row" style="gap:12px;">
                    <button id="playBtn" class="play-btn" onclick="toggleAudio(true)">▶ Παίξε Ήχο</button>
                    <button id="stopBtn" class="stop-btn" onclick="toggleAudio(false)">II Παύση</button>
                </div>

                <button class="save-btn" onclick="saveToLog()">ΑΠΟΘΗΚΕΥΣΗ ΜΕΤΡΗΣΗΣ</button>
            </div>
        </div>

        <div id="history" class="tab-content">
            <h3 style="margin: 0 0 15px 0;">ιστορικό μετρήσεων</h3>
            <div class="log-container">
                <table class="log-table">
                    <thead><tr><th>ημ/νία</th><th>Hz</th><th>vol</th><th>ενοχλ.</th><th></th></tr></thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
            <div style="width:100%; margin-top:15px; display:flex; flex-direction:column; gap:10px;">
                <button onclick="exportCSV()" style="background:#f59e0b; color:black; font-weight:bold; padding:15px; border-radius:12px; border:none; font-size:1rem;">1. Εξαγωγή σε Excel (CSV)</button>
                <button onclick="sendEmail()" style="background:#6366f1; font-weight:bold; color:white; padding:15px; border-radius:12px; border:none; font-size:1rem;">2. Αποστολή στον Ιατρό</button>
                <button onclick="clearHistory()" style="background:var(--danger); opacity:0.7; padding:10px; border-radius:10px; border:none; color:white; font-size:0.8rem; margin-top:5px;">Καθαρισμός Ιστορικού</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div id="nav-setup" class="nav-item active" onclick="openTab('setup')"><span>🎧</span><span>ρύθμιση</span></div>
            <div id="nav-history" class="nav-item" onclick="openTab('history')"><span>📋</span><span>ιστορικό</span></div>
        </nav>
    </div>

    <script>
        let audioCtx, oscillator, pannerNode, gainNode;
        let currentEar = "Both";

        function startApp() { document.getElementById('welcome-screen').classList.add('hidden'); document.getElementById('app-content').style.display = 'flex'; }
        
        function showHelp(key) {
            const t = { pitch: "Ύψος: Η συχνότητα που ταιριάζει με την εμβοή σας.", vol: "Ένταση: Ρυθμίστε μέχρι να καλύψει ή να εξισωθεί με την εμβοή." };
            alert(t[key]);
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
            if(tabId === 'history') renderLog();
        }

        function stepHz(v) { updateFreq(parseInt(document.getElementById('freqInput').value) + v); }
        function stepVol(v) { updateVol(parseInt(document.getElementById('volSlider').value) + v); }

        function updateFreq(val) {
            val = Math.max(125, Math.min(10000, parseInt(val) || 125));
            document.getElementById('freqSlider').value = val;
            document.getElementById('freqInput').value = val;
            if (oscillator && audioCtx) oscillator.frequency.setTargetAtTime(val, audioCtx.currentTime, 0.03);
        }

        function updateVol(val) {
            const s = document.getElementById('volSlider');
            val = Math.max(0, Math.min(parseInt(s.max), parseInt(val) || 0));
            s.value = val;
            document.getElementById('volDisplay').textContent = val + "%";
            if (gainNode && audioCtx) gainNode.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.05);
        }

        function toggleAudio(play) {
            if (play) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    oscillator = audioCtx.createOscillator(); pannerNode = audioCtx.createStereoPanner(); gainNode = audioCtx.createGain();
                    oscillator.frequency.value = parseInt(document.getElementById('freqInput').value);
                    oscillator.connect(pannerNode).connect(gainNode).connect(audioCtx.destination); oscillator.start();
                } else { audioCtx.resume(); }
                updateFreq(document.getElementById('freqInput').value); updateVol(document.getElementById('volSlider').value);
            } else { if (audioCtx) audioCtx.suspend(); }
        }

        function setEar(ear, btn) {
            currentEar = ear;
            const pan = ear === "Left" ? -1 : (ear === "Right" ? 1 : 0);
            if (pannerNode && audioCtx) pannerNode.pan.setTargetAtTime(pan, audioCtx.currentTime, 0.05);
            document.querySelectorAll('.ear-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function saveToLog() {
            const entry = { id: Date.now(), date: new Date().toLocaleDateString('el-GR'), hz: document.getElementById('freqInput').value, vol: document.getElementById('volSlider').value, annoy: document.getElementById('annoySlider').value, ear: currentEar };
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            h.unshift(entry);
            localStorage.setItem('tLogs', JSON.stringify(h.slice(0, 100)));
            alert("Η μέτρηση αποθηκεύτηκε επιτυχώς!");
            renderLog();
        }

        function renderLog() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            document.getElementById('logBody').innerHTML = h.map(i => `<tr><td>${i.date}</td><td>${i.hz}</td><td>${i.vol}%</td><td>${i.annoy}</td><td onclick="deleteEntry(${i.id})" style="color:var(--danger); font-weight:bold; cursor:pointer; text-align:center;">✕</td></tr>`).join('');
        }

        function deleteEntry(id) {
            let h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            localStorage.setItem('tLogs', JSON.stringify(h.filter(i => i.id !== id)));
            renderLog();
        }

        function clearHistory() { if(confirm("Προσοχή! Θα διαγραφούν όλες οι μετρήσεις. Σίγουρα;")) { localStorage.setItem('tLogs', '[]'); renderLog(); } }

        function exportCSV() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            if(h.length === 0) { alert("Δεν υπάρχουν δεδομένα!"); return; }
            const earMap = { "Left": "Αριστερό", "Right": "Δεξί", "Both": "Και τα δύο" };
            let csv = "Ημερομηνία,Hz,Ένταση,Ενοχλητικότητα,Αυτί\n" + h.map(i => `${i.date},${i.hz},${i.vol}%,${i.annoy},${earMap[i.ear] || i.ear}`).join("\n");
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "tinnitus_log.csv"; link.click();
        }

        function sendEmail() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            if (h.length === 0) { alert("Κενό ιστορικό!"); return; }
            const emailTo = "nikeleft@hotmail.com";
            const subject = encodeURIComponent("Ιστορικό Εμβοών");
            const body = encodeURIComponent("Σας στέλνω τις μετρήσεις μου.\n\n(Παρακαλώ επισυνάψτε το αρχείο 'tinnitus_log.csv' που κατεβάσατε).");
            window.location.href = `mailto:${emailTo}?subject=${subject}&body=${body}`;
        }

        document.getElementById('freqSlider').oninput = (e) => updateFreq(e.target.value);
        document.getElementById('volSlider').oninput = (e) => updateVol(e.target.value);
        document.getElementById('annoySlider').oninput = (e) => document.getElementById('annoyDisplay').textContent = e.target.value + "/10";
        document.getElementById('unlockVol').onchange = (e) => { document.getElementById('volSlider').max = e.target.checked ? 100 : 50; };

        window.onload = renderLog;
    </script>
</body>
</html>
