<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Tracker - Δρ. Νίκος Ελευθεριάδης</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907150.png">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #10b981; --danger: #ef4444; --warning: #facc15; }
        body { font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; font-size: 16px; }
        
        /* Welcome Screen */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; padding: 20px; box-sizing: border-box; }
        #welcome-screen.hidden { display: none; }
        .welcome-title { font-size: 2.5rem; font-weight: 800; color: var(--accent); margin: 0; }
        .enter-btn { margin-top: 40px; padding: 18px 60px; border-radius: 40px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; font-size: 1.3rem; cursor: pointer; }

        #app-content { display: none; flex-direction: column; min-height: 100vh; }
        .tab-content { display: none; padding: 20px; flex-grow: 1; padding-bottom: 100px; width: 100%; box-sizing: border-box; }
        .tab-content.active { display: flex; flex-direction: column; align-items: center; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; height: 75px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
        .nav-item span:first-child { font-size: 1.5rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); border-top: 2px solid var(--accent); }
        
        /* Cards & UI Elements */
        .card { background: var(--card); padding: 1.5rem; border-radius: 25px; width: 100%; max-width: 480px; border: 1px solid #334155; box-sizing: border-box; margin-bottom: 20px; }
        .display { font-size: 2rem; font-weight: bold; text-align: center; margin: 15px 0; color: var(--accent); display: flex; justify-content: center; align-items: center; gap: 10px; }
        #freqInput { background: #0f172a; border: 2px solid #334155; color: var(--accent); font-size: 1.8rem; font-weight: bold; width: 120px; text-align: center; border-radius: 12px; padding: 5px; }
        .help-icon { font-size: 0.9rem; color: #94a3b8; border: 1.5px solid #475569; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; margin-left: 8px; font-weight: bold; }
        
        .row { display: flex; justify-content: center; gap: 10px; width: 100%; margin-top: 10px; }
        button { padding: 12px; border-radius: 12px; border: none; font-weight: 600; background: #334155; color: white; font-size: 1rem; cursor: pointer; }
        button.active { background: var(--accent); color: var(--bg); }
        
        /* Sliders */
        input[type=range] { width: 100%; accent-color: var(--accent); height: 40px; }
        
        /* Controls */
        .play-btn { background: #0ea5e9; flex: 1; font-size: 1.2rem; padding: 18px; }
        .stop-btn { background: var(--danger); flex: 1; font-size: 1.2rem; padding: 18px; }
        .save-btn { background: var(--success); width: 100%; margin-top: 20px; padding: 18px; font-size: 1.1rem; font-weight: 800; border-radius: 15px; }
        
        /* History & Charts */
        .chart-box { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #334155; margin-bottom: 25px; width: 100%; height: 280px; box-sizing: border-box; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .log-table th { padding: 12px 8px; border-bottom: 2px solid #334155; text-align: left; color: #94a3b8; }
        .log-table td { padding: 12px 8px; border-bottom: 1px solid #334155; }
        
        h3 { font-size: 1.4rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 class="welcome-title">tinnitus tracker</h1>
        <div style="color:white; margin-top:15px; font-size: 1.3rem;">Δρ. Νίκος Ελευθεριάδης</div>
        <button class="enter-btn" onclick="startApp()">είσοδος</button>
    </div>

    <div id="app-content">
        <div id="setup" class="tab-content active">
            <div class="card">
                <h3 style="text-align:center; margin:0 0 15px; color:#94a3b8;">ρυθμίσεις ήχου</h3>
                
                <div class="display">
                    <span>ύψος</span><span class="help-icon" onclick="showHelp('pitch')">?</span>: 
                    <input type="number" id="freqInput" value="4000"> <span style="font-size: 1.2rem;">Hz</span>
                </div>
                <input type="range" id="freqSlider" min="125" max="10000" value="4000">
                <div class="row">
                    <button onclick="stepHz(-1)" style="flex:1;">− 1Hz</button>
                    <button onclick="stepHz(1)" style="flex:1;">+ 1Hz</button>
                </div>

                <div style="margin-top:25px;">
                    <div style="display:flex; justify-content:space-between; align-items: center;">
                        <span style="font-size: 1.1rem;">ένταση <span class="help-icon" onclick="showHelp('vol')">?</span></span>
                        <span id="volDisplay" style="color:var(--success); font-weight:bold; font-size: 1.5rem;">10%</span>
                    </div>
                    <input type="range" id="volSlider" min="0" max="50" value="10">
                    <div class="row">
                        <button onclick="stepVol(-1)" style="flex:1;">− 1%</button>
                        <button onclick="stepVol(1)" style="flex:1;">+ 1%</button>
                    </div>
                    <label style="font-size:0.9rem; color:var(--danger); display:flex; align-items:center; gap:8px; margin-top:15px;">
                        <input type="checkbox" id="unlockVol" style="width:20px; height:20px;"> ξεκλείδωμα 100%
                    </label>
                </div>

                <div style="margin-top:25px; padding:15px; border:1px dashed var(--warning); border-radius:15px;">
                    <div style="display:flex; justify-content:space-between; align-items: center; color:var(--warning); font-weight:bold;">
                        <span style="font-size: 1.1rem;">ενοχλητικότητα <span class="help-icon" onclick="showHelp('annoy')">?</span></span>
                        <span id="annoyDisplay" style="font-size: 1.5rem;">5/10</span>
                    </div>
                    <input type="range" id="annoySlider" min="1" max="10" value="5">
                </div>

                <div class="row" style="margin-top:20px;">
                    <button class="ear-btn" onclick="setEar('Left', this)" style="flex:1;">αριστερό</button>
                    <button class="ear-btn active" onclick="setEar('Both', this)" style="flex:1;">και τα δύο</button>
                    <button class="ear-btn" onclick="setEar('Right', this)" style="flex:1;">δεξί</button>
                </div>
                
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button id="playBtn" class="play-btn" onclick="toggleAudio(true)">▶ ΠΑΙΞΕ</button>
                    <button id="stopBtn" class="stop-btn" onclick="toggleAudio(false)">II ΠΑΥΣΗ</button>
                </div>
                <button class="save-btn" onclick="saveToLog()">ΑΠΟΘΗΚΕΥΣΗ ΜΕΤΡΗΣΗΣ</button>
            </div>
        </div>

        <div id="charts" class="tab-content">
            <h3>γραφήματα πορείας</h3>
            <div class="chart-box"><canvas id="chartLeft"></canvas></div>
            <div class="chart-box"><canvas id="chartRight"></canvas></div>
            <div class="chart-box"><canvas id="chartBoth"></canvas></div>
        </div>

        <div id="history" class="tab-content">
            <h3>ιστορικό μετρήσεων</h3>
            <div class="card" style="padding:10px; overflow-x:auto; width:100%;">
                <table class="log-table">
                    <thead><tr><th>ημ/νία</th><th>Hz</th><th>vol</th><th>ενοχλ.</th><th></th></tr></thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
            <button onclick="exportCSV()" style="width:100%; background:#f59e0b; color:black; margin-top:15px; padding:15px; border-radius:12px; font-weight:bold;">ΕΞΑΓΩΓΗ (Excel/CSV)</button>
            <button onclick="sendEmail()" style="width:100%; background:#6366f1; margin-top:10px; padding:15px; border-radius:12px; font-weight:bold;">ΑΠΟΣΤΟΛΗ ΣΤΟΝ ΙΑΤΡΟ</button>
        </div>

        <nav class="nav-bar">
            <div id="nav-setup" class="nav-item active" onclick="openTab('setup')"><span>🎧</span><span>Ρύθμιση</span></div>
            <div id="nav-charts" class="nav-item" onclick="openTab('charts')"><span>📈</span><span>Γραφήματα</span></div>
            <div id="nav-history" class="nav-item" onclick="openTab('history')"><span>📋</span><span>Ιστορικό</span></div>
        </nav>
    </div>

    <script>
        let audioCtx, oscillator, pannerNode, gainNode, charts = {};
        let currentEar = "Both";

        function startApp() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('app-content').style.display = 'flex';
        }

        function showHelp(key) {
            const t = { pitch: "Συχνότητα: Ρυθμίστε το 'ύψος' του ήχου.", vol: "Ένταση: Ρυθμίστε πόσο δυνατά ακούγεται ο ήχος.", annoy: "Ενοχλητικότητα: Πόσο σας απασχολεί η εμβοή σήμερα (1-10).", ear: "Επιλογή αυτιού." };
            alert(t[key]);
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
            if(tabId === 'charts') setTimeout(renderCharts, 200);
            if(tabId === 'history') renderLog();
        }

        function stepHz(val) { updateFreq(parseInt(document.getElementById('freqInput').value) + val); }
        function stepVol(val) { updateVol(parseInt(document.getElementById('volSlider').value) + val); }

        function updateFreq(val) {
            val = Math.max(125, Math.min(10000, val));
            document.getElementById('freqSlider').value = val;
            document.getElementById('freqInput').value = val;
            if (oscillator) oscillator.frequency.setTargetAtTime(val, audioCtx.currentTime, 0.03);
        }

        function updateVol(val) {
            const s = document.getElementById('volSlider');
            val = Math.max(0, Math.min(parseInt(s.max), val));
            s.value = val;
            document.getElementById('volDisplay').textContent = val + "%";
            if (gainNode) gainNode.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.05);
        }

        document.getElementById('freqSlider').oninput = (e) => updateFreq(parseInt(e.target.value));
        document.getElementById('freqInput').onchange = (e) => updateFreq(parseInt(e.target.value));
        document.getElementById('volSlider').oninput = (e) => updateVol(parseInt(e.target.value));
        document.getElementById('annoySlider').oninput = (e) => document.getElementById('annoyDisplay').textContent = e.target.value + "/10";
        document.getElementById('unlockVol').onchange = (e) => { 
            const s = document.getElementById('volSlider');
            s.max = e.target.checked ? 100 : 50; 
            if(parseInt(s.value) > 50 && !e.target.checked) updateVol(50);
        };

        function setEar(ear, btn) {
            currentEar = ear;
            const pan = ear === "Left" ? -1 : (ear === "Right" ? 1 : 0);
            if (pannerNode) pannerNode.pan.setTargetAtTime(pan, audioCtx.currentTime, 0.05);
            document.querySelectorAll('.ear-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleAudio(play) {
            if (play) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    oscillator = audioCtx.createOscillator();
                    pannerNode = audioCtx.createStereoPanner();
                    gainNode = audioCtx.createGain();
                    oscillator.connect(pannerNode).connect(gainNode).connect(audioCtx.destination);
                    oscillator.start();
                } else audioCtx.resume();
                updateFreq(document.getElementById('freqInput').value);
                updateVol(document.getElementById('volSlider').value);
            } else { if (audioCtx) audioCtx.suspend(); }
        }

        function saveToLog() {
            const entry = { id: Date.now(), date: new Date().toLocaleDateString('el-GR'), hz: document.getElementById('freqInput').value, vol: document.getElementById('volSlider').value, annoy: document.getElementById('annoySlider').value, ear: currentEar };
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            h.unshift(entry);
            localStorage.setItem('tLogs', JSON.stringify(h.slice(0, 50)));
            alert("Η μέτρηση αποθηκεύτηκε επιτυχώς!");
        }

        function renderLog() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            document.getElementById('logBody').innerHTML = h.map(i => `<tr><td>${i.date}</td><td><b>${i.hz}</b></td><td>${i.vol}%</td><td>${i.annoy}</td><td onclick="deleteItem(${i.id})" style="color:var(--danger); font-weight:bold; cursor:pointer;">✕</td></tr>`).join('');
        }

        function deleteItem(id) { if(confirm("Διαγραφή αυτής της μέτρησης;")) { let h = JSON.parse(localStorage.getItem('tLogs') || '[]'); localStorage.setItem('tLogs', JSON.stringify(h.filter(i => i.id !== id))); renderLog(); } }

        function createChart(canvasId, data, label) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;
            if (charts[canvasId]) charts[canvasId].destroy();
            const rev = [...data].reverse();
            charts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: { labels: rev.map(d => d.date), datasets: [{ label: 'Hz', data: rev.map(d => d.hz), borderColor: '#38bdf8', tension: 0.3, yAxisID: 'y' }, { label: 'Ενοχλ.', data: rev.map(d => d.annoy), borderColor: '#facc15', tension: 0.3, yAxisID: 'y1' }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Hz' } }, y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '1-10' } } } }
            });
        }

        function renderCharts() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            createChart('chartLeft', h.filter(i => i.ear === 'Left'), 'Αριστερό');
            createChart('chartRight', h.filter(i => i.ear === 'Right'), 'Δεξί');
            createChart('chartBoth', h.filter(i => i.ear === 'Both'), 'Και τα δύο');
        }

        function exportCSV() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            let csv = "Ημερομηνία,Συχνότητα(Hz),Ένταση(%),Ενοχλητικότητα,Αυτί\n" + h.map(i => `${i.date},${i.hz},${i.vol},${i.annoy},${i.ear}`).join("\n");
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'tinnitus_tracker_data.csv'; a.click();
        }

        function sendEmail() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            let body = "Ιστορικό Εμβοών (Δρ. Νίκος Ελευθεριάδης):\n\n" + h.map(i => `${i.date}: ${i.hz}Hz, ${i.vol}%, Ενοχλ. ${i.annoy}/10 (${i.ear})`).join("\n");
            window.location.href = `mailto:nikeleft@hotmail.com?subject=Tinnitus Log&body=${encodeURIComponent(body)}`;
        }

        window.onload = renderLog;
    </script>
</body>
</html>
