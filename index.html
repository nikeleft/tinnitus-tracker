<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Tracker - Δρ. Νίκος Ελευθεριάδης</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907150.png">
    <meta name="theme-color" content="#0f172a">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #10b981; --danger: #ef4444; --warning: #facc15; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; padding: 20px; box-sizing: border-box; }
        #welcome-screen.hidden { display: none; }
        .welcome-title { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 0; }
        .enter-btn { margin-top: 30px; padding: 15px 50px; border-radius: 30px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #installBtn { display: none; margin-top: 20px; background: var(--success); color: white; border: none; border-radius: 12px; padding: 12px 25px; font-weight: bold; cursor: pointer; }

        #app-content { display: none; flex-direction: column; min-height: 100vh; }
        .tab-content { display: none; padding: 20px; flex-grow: 1; padding-bottom: 90px; width: 100%; box-sizing: border-box; }
        .tab-content.active { display: flex; flex-direction: column; align-items: center; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; height: 65px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        
        .card { background: var(--card); padding: 1.2rem; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #334155; box-sizing: border-box; margin-bottom: 15px; }
        .display { font-size: 1.8rem; font-weight: bold; text-align: center; margin: 10px 0; color: var(--accent); display: flex; justify-content: center; align-items: center; gap: 8px; }
        #freqInput { background: transparent; border: 2px solid #334155; color: var(--accent); font-size: 1.6rem; font-weight: bold; width: 110px; text-align: center; border-radius: 10px; }
        .help-icon { font-size: 0.8rem; color: #94a3b8; cursor: pointer; border: 1px solid #475569; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; margin-left: 5px; }
        
        .row { display: flex; justify-content: center; gap: 8px; width: 100%; margin-top: 5px; }
        button { padding: 10px; border-radius: 10px; border: none; font-weight: 600; background: #334155; color: white; cursor: pointer; }
        button.active { background: var(--accent); color: var(--bg); }
        input[type=range] { width: 100%; accent-color: var(--accent); height: 35px; }
        
        .play-btn { background: #0ea5e9; flex: 1; font-size: 1.1rem; }
        .stop-btn { background: var(--danger); flex: 1; font-size: 1.1rem; }
        .save-btn { background: var(--success); width: 100%; margin-top: 15px; padding: 15px; font-size: 1rem; font-weight: bold; }
        
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .log-table th, .log-table td { padding: 10px 5px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 class="welcome-title">tinnitus tracker</h1>
        <div style="color:white; margin-top:10px; font-weight: 300;">Δρ. Νίκος Ελευθεριάδης</div>
        <button class="enter-btn" onclick="startApp()">είσοδος</button>
        <button id="installBtn">εγκατάσταση εφαρμογής</button>
    </div>

    <div id="app-content">
        <div id="setup" class="tab-content active">
            <div class="card">
                <h3 style="text-align:center; margin:0 0 10px; color:#94a3b8;">ρυθμίσεις ήχου</h3>
                
                <div class="display">
                    <span>ύψος</span><span class="help-icon" onclick="showHelp('pitch')">?</span>: 
                    <input type="number" id="freqInput" value="4000"> <span>Hz</span>
                </div>
                <input type="range" id="freqSlider" min="125" max="10000" value="4000">
                <div class="row">
                    <button onclick="stepHz(-1)" style="flex:1;">− 1Hz</button>
                    <button onclick="stepHz(1)" style="flex:1;">+ 1Hz</button>
                </div>

                <div style="margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span>ένταση <span class="help-icon" onclick="showHelp('vol')">?</span></span>
                        <span id="volDisplay" style="color:var(--success); font-weight:bold; font-size:1.4rem;">10%</span>
                    </div>
                    <input type="range" id="volSlider" min="0" max="50" value="10">
                    <div class="row">
                        <button onclick="stepVol(-1)" style="flex:1;">− 1%</button>
                        <button onclick="stepVol(1)" style="flex:1;">+ 1%</button>
                    </div>
                    <label style="font-size:0.75rem; color:var(--danger); display:block; margin-top:10px;">
                        <input type="checkbox" id="unlockVol"> ξεκλείδωμα 100%
                    </label>
                </div>

                <div style="margin-top:20px; padding:10px; border:1px dashed var(--warning); border-radius:10px;">
                    <div style="display:flex; justify-content:space-between; color:var(--warning); font-weight:bold;">
                        <span>ενοχλητικότητα <span class="help-icon" onclick="showHelp('annoy')">?</span></span>
                        <span id="annoyDisplay" style="font-size:1.2rem;">5/10</span>
                    </div>
                    <input type="range" id="annoySlider" min="1" max="10" value="5" style="accent-color:var(--warning);">
                </div>

                <div class="row" style="margin-top:15px;">
                    <button class="ear-btn" onclick="setEar('Left', this)" style="flex:1;">αριστερό</button>
                    <button class="ear-btn active" onclick="setEar('Both', this)" style="flex:1;">και τα δύο</button>
                    <button class="ear-btn" onclick="setEar('Right', this)" style="flex:1;">δεξί</button>
                </div>
                
                <div class="row" style="margin-top:15px; gap:10px;">
                    <button id="playBtn" class="play-btn" onclick="toggleAudio(true)">▶ Παίξε</button>
                    <button id="stopBtn" class="stop-btn" onclick="toggleAudio(false)">II Παύση</button>
                </div>
                <button class="save-btn" onclick="saveToLog()">ΑΠΟΘΗΚΕΥΣΗ ΜΕΤΡΗΣΗΣ</button>
            </div>
        </div>

        <div id="history" class="tab-content">
            <h3>ιστορικό</h3>
            <div class="card" style="padding:5px; overflow-x:auto; width:100%;">
                <table class="log-table">
                    <thead><tr><th>ημ/νία</th><th>Hz</th><th>vol</th><th>ενοχλ.</th><th></th></tr></thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
            <div style="width:100%; max-width:450px; margin-top:10px;">
                <button onclick="exportXLSX()" style="width:100%; background:#f59e0b; color:black; margin-bottom:8px; font-weight:bold;">Λήψη αρχείου Excel</button>
                <button onclick="sendExcelToDoctor()" style="width:100%; background:#6366f1; margin-bottom:8px; font-weight:bold;">Αποστολή στον Ιατρό (Excel)</button>
                <button onclick="clearHistory()" style="width:100%; background:var(--danger); opacity:0.8;">Καθαρισμός Ιστορικού</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div id="nav-setup" class="nav-item active" onclick="openTab('setup')"><span>🎧</span><span>ρύθμιση</span></div>
            <div id="nav-history" class="nav-item" onclick="openTab('history')"><span>📋</span><span>ιστορικό</span></div>
        </nav>
    </div>

    <script>
        let audioCtx, oscillator, pannerNode, gainNode;
        let currentEar = "Both";

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        function startApp() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('app-content').style.display = 'flex';
        }

        function showHelp(key) {
            const t = { pitch: "Ύψος: Η συχνότητα που ταυτίζεται με την εμβοή σας.", vol: "Ένταση: Το επίπεδο του ήχου συγκριτικά με την εμβοή.", annoy: "Ενοχλητικότητα: Πόσο σας απασχολεί σήμερα (1-10).", ear: "Επιλέξτε πού ακούτε τον ήχο." };
            alert(t[key]);
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
            if(tabId === 'history') renderLog();
        }

        function stepHz(v) { updateFreq(parseInt(document.getElementById('freqInput').value) + v); }
        function stepVol(v) { updateVol(parseInt(document.getElementById('volSlider').value) + v); }

        function updateFreq(val) {
            val = Math.max(125, Math.min(10000, parseInt(val) || 125));
            document.getElementById('freqSlider').value = val;
            document.getElementById('freqInput').value = val;
            if (oscillator && audioCtx) {
                oscillator.frequency.setTargetAtTime(val, audioCtx.currentTime, 0.03);
            }
        }

        function updateVol(val) {
            const s = document.getElementById('volSlider');
            val = Math.max(0, Math.min(parseInt(s.max), parseInt(val) || 0));
            s.value = val;
            document.getElementById('volDisplay').textContent = val + "%";
            if (gainNode && audioCtx) {
                gainNode.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.05);
            }
        }

        function toggleAudio(play) {
            if (play) {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    oscillator = audioCtx.createOscillator(); 
                    pannerNode = audioCtx.createStereoPanner(); 
                    gainNode = audioCtx.createGain();
                    const initialFreq = parseInt(document.getElementById('freqInput').value);
                    oscillator.frequency.value = initialFreq;
                    oscillator.connect(pannerNode).connect(gainNode).connect(audioCtx.destination); 
                    oscillator.start();
                } else {
                    audioCtx.resume();
                }
                updateFreq(document.getElementById('freqInput').value); 
                updateVol(document.getElementById('volSlider').value);
            } else { 
                if (audioCtx) audioCtx.suspend(); 
            }
        }

        function setEar(ear, btn) {
            currentEar = ear;
            const pan = ear === "Left" ? -1 : (ear === "Right" ? 1 : 0);
            if (pannerNode && audioCtx) pannerNode.pan.setTargetAtTime(pan, audioCtx.currentTime, 0.05);
            document.querySelectorAll('.ear-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function saveToLog() {
            const entry = { Ημερομηνία: new Date().toLocaleString('el-GR'), "Ύψος (Hz)": document.getElementById('freqInput').value, Ένταση: document.getElementById('volSlider').value + "%", Ενοχλητικότητα: document.getElementById('annoySlider').value + "/10", Αυτί: currentEar, id: Date.now() };
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            h.unshift(entry);
            localStorage.setItem('tLogs', JSON.stringify(h.slice(0, 100)));
            alert("Η μέτρηση αποθηκεύτηκε!");
            renderLog();
        }

        function renderLog() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            document.getElementById('logBody').innerHTML = h.map(i => `<tr><td>${i.Ημερομηνία.split(',')[0]}</td><td>${i["Ύψος (Hz)"]}</td><td>${i.Ένταση}</td><td>${i.Ενοχλητικότητα.split('/')[0]}</td><td onclick="deleteEntry(${i.id})" style="color:red; font-weight:bold; cursor:pointer;">✕</td></tr>`).join('');
        }

        function deleteEntry(id) {
            let h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            localStorage.setItem('tLogs', JSON.stringify(h.filter(i => i.id !== id)));
            renderLog();
        }

        function clearHistory() { if(confirm("Προσοχή: Θα διαγραφεί όλο το ιστορικό. Σίγουρα;")) { localStorage.setItem('tLogs', '[]'); renderLog(); } }

        // --- ΝΕΕΣ ΛΕΙΤΟΥΡΓΙΕΣ EXCEL ---

        function generateExcelBlob() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            if(h.length === 0) { alert("Δεν υπάρχουν δεδομένα!"); return null; }
            
            // Καθαρισμός δεδομένων για το Excel (αφαίρεση του id)
            const cleanData = h.map(({id, ...rest}) => rest);
            
            const ws = XLSX.utils.json_to_sheet(cleanData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Μετρήσεις");
            
            const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            return new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        }

        function exportXLSX() {
            const blob = generateExcelBlob();
            if(!blob) return;
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Tinnitus_Report.xlsx";
            link.click();
        }

        async function sendExcelToDoctor() {
            const blob = generateExcelBlob();
            if(!blob) return;

            const file = new File([blob], "Tinnitus_Report.xlsx", { type: blob.type });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Δεδομένα Tinnitus Tracker',
                        text: 'Αποστολή ιστορικού μετρήσεων εμβοών σε αρχείο Excel.'
                    });
                } catch (err) {
                    console.error("Share failed:", err);
                }
            } else {
                alert("Η συσκευή σας δεν υποστηρίζει την άμεση αποστολή αρχείων. Παρακαλώ κατεβάστε το αρχείο Excel και στείλτε το χειροκίνητα.");
            }
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });
        document.getElementById('installBtn').onclick = () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => { if (choice.outcome === 'accepted') document.getElementById('installBtn').style.display = 'none'; });
        };

        document.getElementById('freqSlider').oninput = (e) => updateFreq(e.target.value);
        document.getElementById('volSlider').oninput = (e) => updateVol(e.target.value);
        document.getElementById('annoySlider').oninput = (e) => document.getElementById('annoyDisplay').textContent = e.target.value + "/10";
        document.getElementById('unlockVol').onchange = (e) => { document.getElementById('volSlider').max = e.target.checked ? 100 : 50; };

        window.onload = renderLog;
    </script>
</body>
</html>
