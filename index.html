<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tinnitus Tracker - Δρ. Νίκος Ελευθεριάδης</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907150.png">
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #10b981; --danger: #ef4444; --warning: #facc15; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; padding: 20px; box-sizing: border-box; }
        #welcome-screen.hidden { display: none; }
        .welcome-title { font-size: 2.2rem; font-weight: 800; color: var(--accent); margin: 0; }
        .enter-btn { margin-top: 40px; padding: 15px 50px; border-radius: 30px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        #app-content { display: none; flex-direction: column; min-height: 100vh; }
        .tab-content { display: none; padding: 20px; flex-grow: 1; padding-bottom: 90px; width: 100%; box-sizing: border-box; }
        .tab-content.active { display: flex; flex-direction: column; align-items: center; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; height: 65px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        
        .card { background: var(--card); padding: 1.2rem; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid #334155; box-sizing: border-box; margin-bottom: 15px; }
        .display { font-size: 1.8rem; font-weight: bold; text-align: center; margin: 10px 0; color: var(--accent); display: flex; justify-content: center; align-items: center; gap: 8px; }
        #freqInput { background: transparent; border: 2px solid #334155; color: var(--accent); font-size: 1.6rem; font-weight: bold; width: 100px; text-align: center; border-radius: 10px; }
        .help-icon { font-size: 0.8rem; color: #94a3b8; cursor: pointer; border: 1px solid #475569; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; margin-left: 5px; }
        
        .row { display: flex; justify-content: center; gap: 8px; width: 100%; margin-top: 5px; }
        button { padding: 10px; border-radius: 10px; border: none; font-weight: 600; background: #334155; color: white; cursor: pointer; }
        button.active { background: var(--accent); color: var(--bg); }
        input[type=range] { width: 100%; accent-color: var(--accent); height: 35px; }
        
        .play-btn { background: #0ea5e9; flex: 1; font-size: 1.1rem; }
        .stop-btn { background: var(--danger); flex: 1; font-size: 1.1rem; }
        .save-btn { background: var(--success); width: 100%; margin-top: 15px; padding: 15px; font-size: 1rem; }
        
        .chart-box { background: var(--card); border-radius: 15px; padding: 10px; border: 1px solid #334155; margin-bottom: 20px; width: 100%; max-width: 500px; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .log-table th, .log-table td { padding: 8px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 class="welcome-title">tinnitus tracker</h1>
        <div style="color:white; margin-top:10px;">Δρ. Νίκος Ελευθεριάδης</div>
        <button class="enter-btn" onclick="startApp()">είσοδος</button>
        <button id="installBtn" style="display:none; margin-top:20px; background:var(--success); color:white; border-radius:10px; padding:10px;">Εγκατάσταση Εφαρμογής</button>
    </div>

    <div id="app-content">
        <div id="setup" class="tab-content active">
            <div class="card">
                <h3 style="text-align:center; margin:0 0 10px; color:#94a3b8;">ρυθμίσεις ήχου</h3>
                <div class="display">
                    <span>ύψος</span><span class="help-icon" onclick="showHelp('pitch')">?</span>: 
                    <input type="number" id="freqInput" value="4000"> <span>Hz</span>
                </div>
                <input type="range" id="freqSlider" min="125" max="10000" value="4000">
                <div class="row"><button onclick="stepHz(-1)">− 1Hz</button><button onclick="stepHz(1)">+ 1Hz</button></div>

                <div style="margin-top:20px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>ένταση <span class="help-icon" onclick="showHelp('vol')">?</span></span>
                        <span id="volDisplay" style="color:var(--success); font-weight:bold;">10%</span>
                    </div>
                    <input type="range" id="volSlider" min="0" max="50" value="10">
                    <div class="row"><button onclick="stepVol(-1)">− 1%</button><button onclick="stepVol(1)">+ 1%</button></div>
                    <label style="font-size:0.75rem; color:var(--danger); display:block; margin-top:10px;"><input type="checkbox" id="unlockVol"> ξεκλείδωμα 100%</label>
                </div>

                <div style="margin-top:20px; padding:10px; border:1px dashed var(--warning); border-radius:10px;">
                    <div style="display:flex; justify-content:space-between; color:var(--warning); font-weight:bold;">
                        <span>ενοχλητικότητα <span class="help-icon" onclick="showHelp('annoy')">?</span></span>
                        <span id="annoyDisplay">5/10</span>
                    </div>
                    <input type="range" id="annoySlider" min="1" max="10" value="5" style="accent-color:var(--warning);">
                </div>

                <p style="text-align:center; font-size:0.75rem; color:#94a3b8; margin:15px 0 5px;">επιλογή αυτιού <span class="help-icon" onclick="showHelp('ear')">?</span></p>
                <div class="row">
                    <button class="ear-btn" data-val="Left">αριστερό</button>
                    <button class="ear-btn active" data-val="Both">και τα δύο</button>
                    <button class="ear-btn" data-val="Right">δεξί</button>
                </div>
                
                <div class="row" style="margin-top:15px; gap:10px;">
                    <button id="playBtn" class="play-btn">▶ Παίξε</button>
                    <button id="stopBtn" class="stop-btn">II Παύση</button>
                </div>
                <button id="saveLog" class="save-btn">αποθήκευση μέτρησης</button>
            </div>
        </div>

        <div id="charts" class="tab-content">
            <h3>γραφήματα <span class="help-icon" onclick="showHelp('charts')">?</span></h3>
            <div class="chart-box"><canvas id="chartLeft"></canvas></div>
            <div class="chart-box"><canvas id="chartRight"></canvas></div>
            <div class="chart-box"><canvas id="chartBoth"></canvas></div>
        </div>

        <div id="history" class="tab-content">
            <h3>ιστορικό <span class="help-icon" onclick="showHelp('history')">?</span></h3>
            <div class="card" style="padding:5px; overflow-x:auto; width:100%;">
                <table class="log-table">
                    <thead><tr><th>ημ/νία</th><th>Hz</th><th>vol</th><th>ενοχλ.</th><th></th></tr></thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
            <div style="width:100%; max-width:450px; margin-top:10px;">
                <button id="exportBtn" style="width:100%; background:#f59e0b; color:black; margin-bottom:8px;">εξαγωγή σε excel (CSV)</button>
                <button id="emailBtn" style="width:100%; background:#6366f1; margin-bottom:8px;">αποστολή στο nikeleft@hotmail.com</button>
                <button id="clearBtn" style="width:100%; background:var(--danger); opacity:0.8;">καθαρισμός ιστορικού</button>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="openTab('setup', this)"><span>🎧</span><span>ρύθμιση</span></div>
            <div class="nav-item" onclick="openTab('charts', this)"><span>📈</span><span>γραφήματα</span></div>
            <div class="nav-item" onclick="openTab('history', this)"><span>📋</span><span>ιστορικό</span></div>
        </nav>
    </div>

    <script>
        let audioCtx, oscillator, pannerNode, gainNode, charts = {};
        let currentEar = "Both";

        function startApp() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('app-content').style.display = 'flex';
        }

        function showHelp(key) {
            const texts = { pitch: "Ύψος: Η συχνότητα του ήχου.", vol: "Ένταση: Το επίπεδο του ήχου. Χρησιμοποιήστε τα +/- 1% για ακρίβεια.", annoy: "Ενοχλητικότητα: Πόσο σας απασχολεί σήμερα (1-10).", ear: "Επιλέξτε αυτί.", charts: "Πορεία ανά ημέρα.", history: "Διαχείριση δεδομένων." };
            alert(texts[key]);
        }

        function openTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            if(tabId === 'charts') setTimeout(renderCharts, 100);
        }

        function stepHz(v) { updateFreq(parseInt(document.getElementById('freqInput').value) + v); }
        function stepVol(v) { updateVol(parseInt(document.getElementById('volSlider').value) + v); }

        function updateFreq(val) {
            val = Math.max(125, Math.min(10000, parseInt(val) || 125));
            document.getElementById('freqSlider').value = val;
            document.getElementById('freqInput').value = val;
            if (oscillator) oscillator.frequency.setTargetAtTime(val, audioCtx.currentTime, 0.03);
        }

        function updateVol(val) {
            const s = document.getElementById('volSlider');
            val = Math.max(0, Math.min(parseInt(s.max), parseInt(val) || 0));
            s.value = val;
            document.getElementById('volDisplay').textContent = val + "%";
            if (gainNode) gainNode.gain.setTargetAtTime(val / 100, audioCtx.currentTime, 0.05);
        }

        function saveToLog() {
            const entry = { id: Date.now(), date: new Date().toLocaleDateString('el-GR'), hz: document.getElementById('freqInput').value, vol: document.getElementById('volSlider').value + "%", annoy: document.getElementById('annoySlider').value, ear: currentEar };
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            h.unshift(entry);
            localStorage.setItem('tLogs', JSON.stringify(h.slice(0, 100)));
            renderLog();
            alert("Αποθηκεύτηκε!");
        }

        function renderLog() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            document.getElementById('logBody').innerHTML = h.map(i => `<tr><td>${i.date}</td><td>${i.hz}</td><td>${i.vol}</td><td>${i.annoy}</td><td onclick="deleteEntry(${i.id})" style="color:red; font-weight:bold;">✕</td></tr>`).join('');
        }

        function deleteEntry(id) {
            let h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            localStorage.setItem('tLogs', JSON.stringify(h.filter(i => i.id !== id)));
            renderLog();
        }

        // --- Export & Buttons ---
        document.getElementById('clearBtn').onclick = () => { if(confirm("Διαγραφή ιστορικού;")) { localStorage.setItem('tLogs', '[]'); renderLog(); } };
        document.getElementById('exportBtn').onclick = () => {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            let csv = "Ημερομηνία,Hz,Vol,Annoy,Ear\n" + h.map(i => `${i.date},${i.hz},${i.vol},${i.annoy},${i.ear}`).join("\n");
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "tinnitus.csv"; link.click();
        };
        document.getElementById('emailBtn').onclick = () => {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            let body = h.map(i => `${i.date}: ${i.hz}Hz, ${i.vol}, Ενοχλ. ${i.annoy}/10`).join("\n");
            window.location.href = `mailto:nikeleft@hotmail.com?subject=Tinnitus Data&body=${encodeURIComponent(body)}`;
        };

        // --- Audio & Setup ---
        document.getElementById('playBtn').onclick = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator(); pannerNode = audioCtx.createStereoPanner(); gainNode = audioCtx.createGain();
                oscillator.connect(pannerNode).connect(gainNode).connect(audioCtx.destination); oscillator.start();
            } else audioCtx.resume();
            updateFreq(document.getElementById('freqInput').value); updateVol(document.getElementById('volSlider').value);
        };
        document.getElementById('stopBtn').onclick = () => audioCtx && audioCtx.suspend();
        document.getElementById('freqSlider').oninput = (e) => updateFreq(e.target.value);
        document.getElementById('volSlider').oninput = (e) => updateVol(e.target.value);
        document.getElementById('annoySlider').oninput = (e) => document.getElementById('annoyDisplay').textContent = e.target.value + "/10";
        document.getElementById('unlockVol').onchange = (e) => { document.getElementById('volSlider').max = e.target.checked ? 100 : 50; };
        document.querySelectorAll('.ear-btn').forEach(btn => {
            btn.onclick = () => {
                currentEar = btn.getAttribute('data-val');
                const pan = currentEar === "Left" ? -1 : (currentEar === "Right" ? 1 : 0);
                if (pannerNode) pannerNode.pan.setTargetAtTime(pan, audioCtx.currentTime, 0.05);
                document.querySelectorAll('.ear-btn').forEach(b => b.classList.toggle('active', b === btn));
            };
        });

        function createChart(id, data) {
            const ctx = document.getElementById(id).getContext('2d');
            if (charts[id]) charts[id].destroy();
            const rev = [...data].reverse();
            charts[id] = new Chart(ctx, {
                type: 'line',
                data: { labels: rev.map(d => d.date), datasets: [{ label: 'Hz', data: rev.map(d => d.hz), borderColor: '#38bdf8' }, { label: 'Ενοχλ.', data: rev.map(d => d.annoy), borderColor: '#facc15' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderCharts() {
            const h = JSON.parse(localStorage.getItem('tLogs') || '[]');
            createChart('chartLeft', h.filter(i => i.ear === 'Left'));
            createChart('chartRight', h.filter(i => i.ear === 'Right'));
            createChart('chartBoth', h.filter(i => i.ear === 'Both'));
        }

        // --- Logic για Εγκατάσταση ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });
        document.getElementById('installBtn').addEventListener('click', () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => { if (choice.outcome === 'accepted') document.getElementById('installBtn').style.display = 'none'; });
        });

        window.onload = renderLog;
    </script>
</body>
</html>
